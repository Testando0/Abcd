<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redzin TV | Provedor de Canais</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --sidebar: #121212; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Estilizada */
        .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: linear-gradient(45deg, #4b0082, var(--primary)); text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .channel-list { flex: 1; overflow-y: auto; list-style: none; padding: 10px; margin: 0; }
        .channel-item { 
            padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; 
            background: #1e1e1e; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; border: 1px solid transparent;
        }
        .channel-item:hover { background: #2a2a2a; border-color: var(--primary); transform: translateX(5px); }
        .channel-item img { width: 35px; height: 35px; margin-right: 12px; object-fit: contain; border-radius: 4px; }
        
        /* Player Central */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .video-wrapper { width: 100%; max-width: 1100px; aspect-ratio: 16/9; position: relative; }
        .video-js { width: 100%; height: 100%; border-radius: 12px; box-shadow: 0 0 40px rgba(138, 43, 226, 0.3); }
        
        .status-bar { margin-top: 20px; color: #aaa; font-size: 0.9rem; }
        #current-channel { color: var(--primary); font-weight: bold; }

        /* Scrollbar Custom */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>CRISÁLIDA TV</h2></div>
        <ul class="channel-list" id="playlist">
            <li style="padding: 20px; text-align: center;">Carregando canais...</li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="video-wrapper">
            <video id="main-player" class="video-js vjs-big-play-centered vjs-theme-city" controls preload="auto"></video>
        </div>
        <div class="status-bar">
            Sintonizado em: <span id="current-channel">Nenhum canal selecionado</span>
        </div>
    </main>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const PROXY = "https://proxycors.io/api/v1/proxy?url=";
        const GIST_URL = "https://gist.githubusercontent.com/BrasilChannel/77d80bf7b68011726d2a34ca9c6ad219/raw/";
        
        const player = videojs('main-player');
        const playlistElement = document.getElementById('playlist');

        async function initTV() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(GIST_URL));
                const data = await response.text();
                parseM3U(data);
            } catch (err) {
                playlistElement.innerHTML = `<li style="color:red; padding:20px;">Erro ao carregar lista via Proxy.</li>`;
            }
        }

        function parseM3U(content) {
            playlistElement.innerHTML = "";
            const lines = content.split('\n');
            let currentChannel = {};

            lines.forEach(line => {
                if (line.startsWith('#EXTINF')) {
                    const nameMatch = line.split(',')[1];
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.name = nameMatch ? nameMatch.trim() : "Canal Desconhecido";
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                } else if (line.startsWith('http')) {
                    currentChannel.url = line.trim();
                    createChannelElement(currentChannel);
                    currentChannel = {};
                }
            });
        }

        function createChannelElement(ch) {
            const li = document.createElement('li');
            li.className = 'channel-item';
            li.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40/121212/8a2be2?text=TV'"> <span>${ch.name}</span>`;
            
            li.onclick = () => {
                // Aplica o proxy na URL do vídeo para evitar bloqueios CORS
                const proxiedUrl = PROXY + encodeURIComponent(ch.url);
                player.src({ src: proxiedUrl, type: 'application/x-mpegURL' });
                player.play();
                document.getElementById('current-channel').innerText = ch.name;
            };
            playlistElement.appendChild(li);
        }

        initTV();
    </script>
</body>
</html>
