<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisálida Play - Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; }
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; z-index: 10; }
        #player-overlay { display: none; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <nav class="p-5 bg-black flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-red-600 text-3xl font-black tracking-tighter">CRISÁLIDA</h1>
        <div id="status" class="text-xs text-gray-500 italic">Conectando ao catálogo...</div>
    </nav>

    <header id="hero" class="h-[60vh] bg-cover bg-center flex items-end p-10 mb-10" style="background-image: linear-gradient(to top, #141414, transparent);">
        <div>
            <h2 id="hero-title" class="text-5xl font-bold">...</h2>
            <p id="hero-desc" class="max-w-xl my-4 text-gray-300"></p>
            <button id="hero-btn" class="bg-white text-black font-bold py-2 px-6 rounded hover:bg-gray-300">▶ Assistir Agora</button>
        </div>
    </header>

    <div class="px-10">
        <h3 class="text-xl font-bold mb-4">Populares na Irmandade</h3>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5">
            </div>
    </div>

    <div id="player-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <button onclick="closePlayer()" class="absolute top-5 right-10 text-4xl">&times;</button>
        <div id="video-wrapper" class="w-full max-w-5xl aspect-video bg-black rounded-lg overflow-hidden shadow-2xl"></div>
    </div>

    <script>
        // SUA CHAVE INSERIDA AQUI
        const API_KEY = '8265bd1679663a7ea12ac168da84d2e8'; 
        const TMDB_BASE = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/original';

        async function init() {
            const statusEl = document.getElementById('status');
            try {
                console.log("Tentando carregar filmes...");
                const res = await fetch(`${TMDB_BASE}/movie/popular?api_key=${API_KEY}&language=pt-BR`);
                
                if (!res.ok) throw new Error(`Erro na API: ${res.status}`);
                
                const data = await res.json();
                console.log("Dados recebidos:", data);

                if (data.results && data.results.length > 0) {
                    displayMovies(data.results);
                    setHero(data.results[0]);
                    statusEl.innerText = "Catálogo atualizado";
                } else {
                    statusEl.innerText = "Nenhum filme encontrado.";
                }

            } catch (err) {
                console.error("ERRO FATAL:", err);
                statusEl.innerText = "Erro ao carregar. Verifique o Console (F12).";
                alert("Erro ao conectar com TMDB. Verifique sua conexão ou se a chave está ativa.");
            }
        }

        function setHero(movie) {
            document.getElementById('hero').style.backgroundImage = `linear-gradient(to top, #141414, transparent), url('${IMG_URL + movie.backdrop_path}')`;
            document.getElementById('hero-title').innerText = movie.title;
            document.getElementById('hero-desc').innerText = movie.overview;
            document.getElementById('hero-btn').onclick = () => loadPlayer(movie.id);
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card cursor-pointer" onclick="loadPlayer(${m.id})">
                    <img src="${IMG_URL + m.poster_path}" class="rounded shadow-md hover:shadow-red-900/50">
                    <p class="mt-2 text-xs font-semibold truncate">${m.title}</p>
                </div>
            `).join('');
        }

        async function loadPlayer(tmdbId) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Buscando servidor de vídeo...";
            
            // Puxa o IMDB ID para garantir compatibilidade máxima
            const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}?api_key=${API_KEY}`);
            const movie = await res.json();
            
            const playerWrapper = document.getElementById('video-wrapper');
            // Usando Vidsrc.to com sandbox para bloquear anúncios
            playerWrapper.innerHTML = `
                <iframe 
                    src="https://vidsrc.to/embed/movie/${movie.imdb_id}" 
                    style="width:100%; height:100%;" 
                    frameborder="0" 
                    allowfullscreen
                    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts">
                </iframe>
            `;
            document.getElementById('player-overlay').style.display = 'flex';
            statusEl.innerText = "Reproduzindo: " + movie.title;
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('video-wrapper').innerHTML = '';
        }

        // Iniciar
        init();
    </script>
</body>
</html>
