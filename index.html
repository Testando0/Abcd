<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redflix - Painel</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --primary: #9d4edd; --bg: #050505; --card: #111; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); background: #000; }
        .menu { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        
        input, button { 
            padding: 10px 15px; border-radius: 5px; border: 1px solid #333; 
            background: #1a1a1a; color: white; outline: none;
        }
        button { cursor: pointer; border-color: var(--primary); transition: 0.3s; }
        button:hover { background: var(--primary); }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; padding: 20px; 
        }
        .card { 
            background: var(--card); border-radius: 10px; overflow: hidden; 
            transition: 0.3s; cursor: pointer; border: 1px solid #222;
        }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-name { padding: 10px; font-size: 0.9rem; text-align: center; }

        /* Player Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .player-box { width: 90%; max-width: 1000px; aspect-ratio: 16/9; }
        .close-modal { margin-bottom: 10px; align-self: flex-end; color: #ff4d4d; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>REDFLIX</h1></header>

<div class="menu">
    <input type="text" id="m3uUrl" placeholder="Cole o link .m3u ou Gist aqui...">
    <button onclick="loadExternalList()">Carregar Lista</button>
    <button onclick="renderGrid(localData)">Lista Padrão</button>
</div>

<div class="grid" id="mainGrid"></div>

<div class="modal" id="videoModal">
    <div class="player-box">
        <div class="close-modal" onclick="closePlayer()">FECHAR [X]</div>
        <video id="player" playsinline controls></video>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.min.js"></script>

<script>
    // LISTA LOCAL PARA NUNCA FICAR VAZIO (CANAIS E FILMES TESTE)
    const localData = [
        { name: "Big Buck Bunny (Filme)", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/220px-Big_buck_bunny_poster_big.jpg" },
        { name: "Sintel (Série)", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Sintel_poster.jpg/220px-Sintel_poster.jpg" },
        { name: "Tears of Steel", url: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Tears_of_Steel_poster.jpg/220px-Tears_of_Steel_poster.jpg" }
    ];

    const grid = document.getElementById('mainGrid');
    const playerElement = document.getElementById('player');
    const modal = document.getElementById('videoModal');
    const plyr = new Plyr(playerElement);
    let hls;

    // Renderiza a interface
    function renderGrid(data) {
        grid.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${item.logo}" onerror="this.src='https://via.placeholder.com/200x250/111/9d4edd?text=Redflix'">
                <div class="card-name">${item.name}</div>
            `;
            div.onclick = () => openPlayer(item.url);
            grid.appendChild(div);
        });
    }

    // Carrega lista via URL (Bypassing CORS via proxy alternativo se necessário)
    async function loadExternalList() {
        const url = document.getElementById('m3uUrl').value;
        if(!url) return alert("Cole um link válido!");
        
        grid.innerHTML = '<p>Processando lista...</p>';
        try {
            // Tentativa direta (mais rápida)
            let response = await fetch(url);
            if(!response.ok) throw new Error();
            const text = await response.text();
            parseM3U(text);
        } catch (e) {
            // Se falhar, tenta via Proxy de emergência
            try {
                const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const text = await response.text();
                parseM3U(text);
            } catch (err) {
                alert("Erro ao acessar a lista. O link pode estar offline ou bloqueado.");
                renderGrid(localData);
            }
        }
    }

    function parseM3U(content) {
        const items = [];
        const lines = content.split('\n');
        let currentItem = {};

        lines.forEach(line => {
            if (line.includes('#EXTINF')) {
                currentItem.name = line.split(',')[1] || "Sem Nome";
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                currentItem.logo = logoMatch ? logoMatch[1] : "";
            } else if (line.startsWith('http')) {
                currentItem.url = line.trim();
                items.push({...currentItem});
                currentItem = {};
            }
        });
        renderGrid(items);
    }

    function openPlayer(url) {
        modal.style.display = 'flex';
        if (hls) hls.destroy();

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(playerElement);
            }
        } else {
            playerElement.src = url;
        }
        plyr.play();
    }

    function closePlayer() {
        modal.style.display = 'none';
        plyr.stop();
        if(hls) hls.destroy();
    }

    // Inicializa com dados locais para não travar
    renderGrid(localData);
</script>
</body>
</html>
